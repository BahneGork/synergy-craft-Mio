<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masterwork Crafting Ledger</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
    :root {
        --parchment: #fcf5e5;
        --ink: #1a140f;
        --gold: #b08d44;
        --crimson: #8b0000;
        --card-bg: #ffffff;
    }

    body {
        background-color: #121212;
        margin: 0;
        padding: 0;
        font-family: 'Lora', serif;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
    }

    .ledger-container {
        max-width: 1200px;
        width: 100%;
        background-color: var(--parchment);
        background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
        border-left: 4px solid var(--gold);
        border-right: 4px solid var(--gold);
        padding: 0 30px 30px 30px;
        box-sizing: border-box;
        box-shadow: 0 0 50px rgba(0,0,0,0.5);
        min-height: 100vh;
    }

    /* --- STICKY HEADER SECTION --- */
    .sticky-header {
        position: sticky;
        top: 0;
        z-index: 1000;
        background-color: var(--parchment);
        background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
        padding-top: 30px;
        border-bottom: 3px double var(--gold);
        margin-bottom: 30px;
        box-shadow: 0 10px 20px -10px rgba(0,0,0,0.15);
    }

    .header-section {
        text-align: center;
        margin-bottom: 20px;
    }

    h1 {
        font-family: 'MedievalSharp', cursive;
        font-size: 2.8rem;
        color: var(--crimson);
        margin: 0 auto;
        letter-spacing: 2px;
    }

    .credits {
        font-style: italic;
        font-size: 1.1rem;
        color: var(--ink);
        margin: 10px auto 0 auto;
    }

    .credits strong { color: var(--crimson); }

    .controls {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 15px;
        padding-bottom: 20px;
        max-width: 900px;
        margin: 0 auto;
        align-items: stretch;
    }

    @media (max-width: 600px) {
        .controls { grid-template-columns: 1fr; }
        h1 { font-size: 1.8rem; }
        .list-toggle-btn { grid-column: 1; }
    }

    input, select {
        width: 100%;
        padding: 12px;
        border: 2px solid var(--gold);
        background: rgba(255,255,255,0.5);
        font-size: 1rem;
        box-sizing: border-box;
        font-family: 'Lora', serif;
    }

    .list-toggle-btn {
        padding: 12px 18px;
        border: 2px solid var(--gold);
        background: var(--gold);
        color: #fff;
        font-size: 1rem;
        font-family: 'Lora', serif;
        font-weight: 700;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.2s, color 0.2s;
        box-sizing: border-box;
    }

    .list-toggle-btn:hover {
        background: var(--crimson);
        border-color: var(--crimson);
    }

    /* --- ITEM GRID & CARDS --- */
    .items-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
    }

    .item-card {
        background: var(--card-bg);
        border: 1px solid var(--gold);
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .item-card:hover { transform: translateY(-5px); }

    .item-card.selected {
        box-shadow: 0 0 0 2px var(--crimson), 0 4px 6px rgba(0,0,0,0.1);
    }

    .badge-container {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-bottom: 8px;
    }

    .card-header {
        background: #f4ebd0;
        padding: 12px 15px;
        border-bottom: 2px solid var(--gold);
        display: flex;
        flex-direction: column;
    }

    .card-header-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 8px;
    }

    .class-badge {
        background: var(--crimson);
        color: white;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 0.7rem;
        text-transform: uppercase;
        font-weight: bold;
    }

    .item-title {
        margin: 5px 0 0 0;
        font-size: 1.2rem;
        line-height: 1.2;
        color: var(--ink);
        font-family: 'MedievalSharp', cursive;
        flex: 1;
    }

    .select-btn {
        background: transparent;
        border: 1px solid var(--gold);
        color: var(--gold);
        padding: 4px 10px;
        font-size: 0.75rem;
        font-family: 'Lora', serif;
        font-weight: 700;
        cursor: pointer;
        border-radius: 4px;
        white-space: nowrap;
        min-height: 30px;
        transition: background 0.2s, color 0.2s, border-color 0.2s;
        flex-shrink: 0;
    }

    .select-btn:hover {
        background: var(--gold);
        color: #fff;
    }

    .select-btn.active {
        background: var(--crimson);
        border-color: var(--crimson);
        color: #fff;
    }

    .card-body { padding: 15px; }

    .progress-bar-row {
        padding: 6px 0 8px;
        border-bottom: 1px solid rgba(176, 141, 68, 0.3);
        margin-bottom: 4px;
    }

    .progress-text {
        font-size: 0.8rem;
        color: var(--gold);
        font-style: italic;
    }

    .ingredient-row {
        display: flex;
        flex-direction: column;
        padding: 10px 0;
        border-bottom: 1px solid rgba(176, 141, 68, 0.2);
    }

    .qty-name-group {
        display: flex;
        align-items: center;
        margin-bottom: 4px;
        gap: 8px;
    }

    .qty {
        background: #eee;
        color: var(--crimson);
        font-weight: bold;
        padding: 2px 6px;
        border-radius: 4px;
        min-width: 35px;
        text-align: center;
        font-size: 0.9rem;
        flex-shrink: 0;
        transition: background 0.2s, color 0.2s;
    }

    .name {
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--ink);
        flex: 1;
        transition: color 0.2s, text-decoration 0.2s;
    }

    /* Counter control: [  5  / 24 ] */
    .counter-group {
        display: flex;
        align-items: center;
        gap: 3px;
        flex-shrink: 0;
        margin-left: auto;
    }

    .counter-input {
        width: 44px;
        padding: 2px 4px;
        border: 1px solid var(--gold);
        background: rgba(255,255,255,0.7);
        font-family: 'Lora', serif;
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--ink);
        text-align: center;
        border-radius: 3px;
        box-sizing: border-box;
        /* hide spinner arrows */
        -moz-appearance: textfield;
    }

    .counter-input::-webkit-outer-spin-button,
    .counter-input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }

    .counter-input:focus {
        outline: none;
        border-color: var(--crimson);
    }

    .counter-sep {
        font-size: 0.8rem;
        color: #888;
    }

    .counter-max {
        font-size: 0.8rem;
        color: #888;
        min-width: 28px;
    }

    .location-text {
        font-size: 0.8rem;
        color: #666;
        padding-left: 4px;
        font-style: italic;
        transition: color 0.2s;
    }

    .location-text strong { color: var(--gold); }

    /* Clickable ingredient name */
    .name-btn {
        background: none;
        border: none;
        padding: 0;
        font: inherit;
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--ink);
        cursor: pointer;
        text-align: left;
        flex: 1;
        transition: color 0.15s;
    }

    .name-btn:hover {
        color: var(--crimson);
        text-decoration: underline dotted;
    }

    /* Active ingredient filter banner */
    .ingredient-filter-banner {
        display: none;
        align-items: center;
        gap: 10px;
        background: var(--crimson);
        color: #fff;
        padding: 8px 15px;
        font-size: 0.85rem;
        font-family: 'Lora', serif;
        margin-bottom: 20px;
        border-radius: 4px;
    }

    .ingredient-filter-banner.active { display: flex; }

    .ingredient-filter-banner strong { font-style: italic; }

    .clear-filter-btn {
        margin-left: auto;
        background: rgba(255,255,255,0.2);
        border: 1px solid rgba(255,255,255,0.5);
        color: #fff;
        padding: 3px 10px;
        font-family: 'Lora', serif;
        font-size: 0.8rem;
        cursor: pointer;
        border-radius: 3px;
        white-space: nowrap;
    }

    .clear-filter-btn:hover { background: rgba(255,255,255,0.35); }

    /* Done ingredient state (collected >= needed) */
    .ingredient-row.done .name {
        text-decoration: line-through;
        color: #aaa;
    }

    .ingredient-row.done .qty {
        background: #c8e6c9;
        color: #388e3c;
    }

    .ingredient-row.done .counter-input {
        background: #c8e6c9;
        color: #388e3c;
        border-color: #81c784;
    }

    .ingredient-row.done .location-text {
        color: #bbb;
    }

    .ingredient-row.done .location-text strong {
        color: #bbb;
    }

    .discord-link {
        color: #5865F2;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
    }

    .discord-link:hover {
        color: var(--crimson);
        text-decoration: underline;
    }

    /* --- SHOPPING PANEL --- */
    .shopping-panel {
        position: fixed;
        top: 0;
        right: -380px;
        width: 360px;
        height: 100vh;
        background-color: var(--parchment);
        background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
        border-left: 4px solid var(--gold);
        z-index: 2000;
        transition: right 0.3s ease;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        box-shadow: -10px 0 30px rgba(0,0,0,0.4);
    }

    .shopping-panel.open {
        right: 0;
    }

    .panel-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 1999;
    }

    .panel-backdrop.open {
        display: block;
    }

    .panel-header {
        padding: 20px;
        border-bottom: 2px solid var(--gold);
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        background-color: var(--parchment);
        background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
        flex-shrink: 0;
    }

    .panel-title {
        font-family: 'MedievalSharp', cursive;
        color: var(--crimson);
        font-size: 1.4rem;
        margin: 0;
    }

    .panel-close-btn {
        background: transparent;
        border: none;
        color: var(--gold);
        font-size: 1.4rem;
        cursor: pointer;
        padding: 4px 8px;
        line-height: 1;
        min-height: 44px;
        min-width: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .panel-close-btn:hover { color: var(--crimson); }

    .panel-content {
        flex: 1;
        padding: 15px;
        overflow-y: auto;
    }

    .panel-empty {
        text-align: center;
        font-style: italic;
        color: #888;
        margin-top: 40px;
        font-size: 0.95rem;
        line-height: 1.6;
    }

    .panel-footer {
        padding: 15px;
        border-top: 2px solid var(--gold);
        background-color: var(--parchment);
        background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
        flex-shrink: 0;
    }

    .panel-reset-btn {
        width: 100%;
        padding: 10px;
        background: transparent;
        border: 2px solid var(--crimson);
        color: var(--crimson);
        font-family: 'Lora', serif;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background 0.2s, color 0.2s;
    }

    .panel-reset-btn:hover {
        background: var(--crimson);
        color: #fff;
    }

    /* Shopping list rows */
    .shop-section-header {
        font-size: 0.75rem;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin: 16px 0 6px;
        border-bottom: 1px solid rgba(176, 141, 68, 0.3);
        padding-bottom: 4px;
    }

    .shop-ingredient-row {
        display: flex;
        flex-direction: column;
        padding: 8px 0;
        border-bottom: 1px solid rgba(176, 141, 68, 0.15);
    }

    .shop-qty-name {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 3px;
    }

    .shop-qty {
        background: #eee;
        color: var(--crimson);
        font-weight: bold;
        padding: 2px 6px;
        border-radius: 4px;
        min-width: 40px;
        text-align: center;
        font-size: 0.9rem;
        flex-shrink: 0;
    }

    .shop-name {
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--ink);
    }

    .shop-collected {
        font-size: 0.78rem;
        color: var(--gold);
        font-style: italic;
        padding-left: 4px;
        margin-bottom: 2px;
    }

    .shop-location {
        font-size: 0.78rem;
        color: #666;
        font-style: italic;
        padding-left: 4px;
    }

    .shop-location strong { color: var(--gold); }

    @media (max-width: 600px) {
        .shopping-panel {
            width: 100vw;
            right: -100vw;
        }
        .shopping-panel.open {
            right: 0;
        }
    }

</style>
</head>
<body>

<div class="ledger-container">
    <div class="sticky-header">
        <div class="header-section">
            <h1>Masterwork Crafting Ledger</h1>
            <p class="credits">
                Created by the <strong><a href="https://discord.gg/ZAEfYwdjc8" target="_blank" class="discord-link">Synergy</a></strong> Guild &bull; Neverwinter<br>
                <span>Data compiled by <strong>Ivydora</strong> & <strong>Asura</strong></span>
            </p>
        </div>

        <div class="controls">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Search item or class..." onkeyup="filterData()">
            </div>
            <div class="filter-wrapper">
                <select id="classFilter" onchange="filterData()">
                    <option value="All">All Classes</option>
                    <option value="Barbarian">Barbarian</option>
                    <option value="Bard">Bard</option>
                    <option value="Cleric">Cleric</option>
                    <option value="Fighter">Fighter</option>
                    <option value="Paladin">Paladin</option>
                    <option value="Ranger">Ranger</option>
                    <option value="Rogue">Rogue</option>
                    <option value="Warlock">Warlock</option>
                    <option value="Wizard">Wizard</option>
                </select>
            </div>
            <button class="list-toggle-btn" onclick="togglePanel()" id="listToggleBtn">
                Shopping List (<span id="listCount">0</span>)
            </button>
        </div>
    </div>
    <div id="ingredientFilterBanner" class="ingredient-filter-banner">
        Showing items requiring: <strong id="ingredientFilterLabel"></strong>
        <button class="clear-filter-btn" onclick="clearIngredientFilter()">&#x2715; Clear</button>
    </div>
    <div id="itemsGrid" class="items-grid"></div>
</div>

<!-- Shopping List Drawer -->
<div id="shoppingPanel" class="shopping-panel" aria-hidden="true" aria-label="Shopping List">
    <div class="panel-header">
        <h2 class="panel-title">Shopping List</h2>
        <button class="panel-close-btn" onclick="togglePanel()" aria-label="Close shopping list">&#x2715;</button>
    </div>
    <div id="shoppingContent" class="panel-content" aria-live="polite"></div>
    <div class="panel-footer">
        <button class="panel-reset-btn" id="resetBtn" onclick="confirmReset()">Reset All Progress</button>
    </div>
</div>
<div id="panelBackdrop" class="panel-backdrop" onclick="togglePanel()"></div>

    // --- PARSE INFRASTRUCTURE ---
    function parseIngredient(resource) {
        const match = resource.match(/^(\d+)x\s+(.+)$/);
        return match
            ? { qty: parseInt(match[1], 10), name: match[2] }
            : { qty: 0, name: resource };
    }

    const parsedCraftingData = craftingData.map(entry => ({
        ...entry,
        ingredients: entry.ingredients.map(ing => ({
            location: ing.location,
            ...parseIngredient(ing.resource)
        }))
    }));

    // --- STATE LAYER ---
    const appState = {
        selectedItems: new Set(),
        progress: {},
        panelOpen: false,
        ingredientFilter: null
    };

    // localStorage helpers with fallback for browsers that block it on file://
    let storage;
    try {
        localStorage.setItem('__test__', '1');
        localStorage.removeItem('__test__');
        storage = localStorage;
    } catch (e) {
        storage = { _data: {}, getItem(k) { return this._data[k] ?? null; }, setItem(k, v) { this._data[k] = v; }, removeItem(k) { delete this._data[k]; } };
    }

    function loadState() {
        try {
            const prog = storage.getItem('synergy-crafting-progress');
            if (prog) appState.progress = JSON.parse(prog);
            const shop = storage.getItem('synergy-crafting-shopping');
            if (shop) appState.selectedItems = new Set(JSON.parse(shop));
        } catch (e) {
            appState.progress = {};
            appState.selectedItems = new Set();
        }
    }

    function saveProgress() {
        storage.setItem('synergy-crafting-progress', JSON.stringify(appState.progress));
    }

    function saveSelected() {
        storage.setItem('synergy-crafting-shopping', JSON.stringify([...appState.selectedItems]));
    }

    // --- RENDER ---
    function renderTable(data) {
        const grid = document.getElementById('itemsGrid');
        grid.innerHTML = '';

        data.forEach(entry => {
            const card = document.createElement('div');
            const isSelected = appState.selectedItems.has(entry.item);
            card.className = 'item-card' + (isSelected ? ' selected' : '');
            card.dataset.item = entry.item;

            const badgesHtml = entry.classes.map(cls =>
                `<span class="class-badge">${cls}</span>`
            ).join('');

            const prog = appState.progress[entry.item] || [];
            const doneCount = entry.ingredients.filter((ing, i) => (prog[i] || 0) >= ing.qty).length;
            const total = entry.ingredients.length;

            const ingredientHtml = entry.ingredients.map((ing, i) => {
                const collected = prog[i] || 0;
                const isDone = collected >= ing.qty;
                return `
                    <div class="ingredient-row${isDone ? ' done' : ''}">
                        <div class="qty-name-group">
                            <span class="qty">${ing.qty}x</span>
                            <button class="name-btn" data-ingredient="${escHtml(ing.name)}" onclick="filterByIngredient(this.dataset.ingredient)">${escHtml(ing.name)}</button>
                            <div class="counter-group">
                                <input type="number" class="counter-input"
                                       min="0" max="${ing.qty}"
                                       value="${collected}"
                                       data-item="${escHtml(entry.item)}"
                                       data-index="${i}"
                                       data-max="${ing.qty}"
                                       oninput="setIngredientCount(this.dataset.item, +this.dataset.index, +this.dataset.max, +this.value)">
                                <span class="counter-sep">/</span>
                                <span class="counter-max">${ing.qty}</span>
                            </div>
                        </div>
                        <div class="location-text">Source: <strong>${escHtml(ing.location)}</strong></div>
                    </div>`;
            }).join('');

            card.innerHTML = `
                <div class="card-header">
                    <div class="card-header-top">
                        <div class="badge-container">${badgesHtml}</div>
                        <button class="select-btn${isSelected ? ' active' : ''}"
                                data-item="${escHtml(entry.item)}"
                                aria-pressed="${isSelected}"
                                onclick="toggleSelected(this.dataset.item)">
                            ${isSelected ? '&#10003; In List' : '+ Add to List'}
                        </button>
                    </div>
                    <h2 class="item-title">${escHtml(entry.item)}</h2>
                </div>
                <div class="card-body">
                    <div class="progress-bar-row">
                        <span class="progress-text" data-progress="${escHtml(entry.item)}">${doneCount} / ${total} ingredients complete</span>
                    </div>
                    <div class="ingredient-list">${ingredientHtml}</div>
                </div>`;

            grid.appendChild(card);
        });
    }

    function escHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function filterData() {
        const searchVal = document.getElementById('searchInput').value.toLowerCase();
        const classVal = document.getElementById('classFilter').value;

        const filtered = parsedCraftingData.filter(d => {
            const matchesSearch = d.item.toLowerCase().includes(searchVal) ||
                                 d.classes.some(cls => cls.toLowerCase().includes(searchVal));
            const matchesClass = (classVal === 'All' || d.classes.includes(classVal));
            const matchesIngredient = !appState.ingredientFilter ||
                                      d.ingredients.some(ing => ing.name === appState.ingredientFilter);
            return matchesSearch && matchesClass && matchesIngredient;
        });
        renderTable(filtered);
    }

    function filterByIngredient(name) {
        // Toggle off if clicking the same ingredient again
        if (appState.ingredientFilter === name) {
            clearIngredientFilter();
            return;
        }
        appState.ingredientFilter = name;
        document.getElementById('ingredientFilterLabel').textContent = name;
        document.getElementById('ingredientFilterBanner').classList.add('active');
        filterData();
    }

    function clearIngredientFilter() {
        appState.ingredientFilter = null;
        document.getElementById('ingredientFilterBanner').classList.remove('active');
        filterData();
    }

    // --- PROGRESS TRACKER ---
    function setIngredientCount(itemName, index, max, value) {
        const clamped = Math.max(0, Math.min(max, isNaN(value) ? 0 : value));

        if (!appState.progress[itemName]) {
            const entry = parsedCraftingData.find(e => e.item === itemName);
            appState.progress[itemName] = new Array(entry ? entry.ingredients.length : 0).fill(0);
        }
        appState.progress[itemName][index] = clamped;
        saveProgress();

        // Targeted DOM update — no full re-render
        const input = document.querySelector(`.counter-input[data-item="${CSS.escape(itemName)}"][data-index="${index}"]`);
        if (input && +input.value !== clamped) input.value = clamped;
        const row = input?.closest('.ingredient-row');
        if (row) row.classList.toggle('done', clamped >= max);

        // Update card progress counter
        const entry = parsedCraftingData.find(e => e.item === itemName);
        if (entry) {
            const prog = appState.progress[itemName] || [];
            const doneCount = entry.ingredients.filter((ing, i) => (prog[i] || 0) >= ing.qty).length;
            const counter = document.querySelector(`[data-progress="${CSS.escape(itemName)}"]`);
            if (counter) counter.textContent = `${doneCount} / ${entry.ingredients.length} ingredients complete`;
        }

        // Refresh panel if open
        if (appState.panelOpen) updatePanel();
    }

    // --- SHOPPING LIST SELECTION ---
    function toggleSelected(itemName) {
        if (appState.selectedItems.has(itemName)) {
            appState.selectedItems.delete(itemName);
        } else {
            appState.selectedItems.add(itemName);
        }
        saveSelected();

        // Targeted DOM update
        const card = document.querySelector(`.item-card[data-item="${CSS.escape(itemName)}"]`);
        if (card) {
            const isSelected = appState.selectedItems.has(itemName);
            card.classList.toggle('selected', isSelected);
            const btn = card.querySelector('.select-btn');
            if (btn) {
                btn.classList.toggle('active', isSelected);
                btn.setAttribute('aria-pressed', isSelected);
                btn.innerHTML = isSelected ? '&#10003; In List' : '+ Add to List';
            }
        }

        // Update header count
        document.getElementById('listCount').textContent = appState.selectedItems.size;

        if (appState.panelOpen) updatePanel();
    }

    // --- SHOPPING PANEL ---
    function togglePanel() {
        appState.panelOpen = !appState.panelOpen;
        const panel = document.getElementById('shoppingPanel');
        const backdrop = document.getElementById('panelBackdrop');
        panel.classList.toggle('open', appState.panelOpen);
        backdrop.classList.toggle('open', appState.panelOpen);
        panel.setAttribute('aria-hidden', !appState.panelOpen);
        if (appState.panelOpen) updatePanel();
    }

    function buildShoppingList() {
        const aggregated = {};

        for (const itemName of appState.selectedItems) {
            const entry = parsedCraftingData.find(e => e.item === itemName);
            if (!entry) continue;
            const prog = appState.progress[itemName] || [];

            entry.ingredients.forEach((ing, i) => {
                if (!aggregated[ing.name]) {
                    aggregated[ing.name] = { qty: 0, locations: new Set(), collected: 0 };
                }
                aggregated[ing.name].qty += ing.qty;
                aggregated[ing.name].locations.add(ing.location);
                aggregated[ing.name].collected += Math.min(prog[i] || 0, ing.qty);
            });
        }

        return aggregated;
    }

    function updatePanel() {
        const content = document.getElementById('shoppingContent');
        document.getElementById('listCount').textContent = appState.selectedItems.size;

        if (appState.selectedItems.size === 0) {
            content.innerHTML = '<p class="panel-empty">No items added yet.<br>Click <strong>+ Add to List</strong> on any item card to begin.</p>';
            return;
        }

        const aggregated = buildShoppingList();
        const sorted = Object.entries(aggregated).sort((a, b) => a[0].localeCompare(b[0]));

        const rows = sorted.map(([name, data]) => {
            const locationsHtml = [...data.locations].map(l => `<strong>${escHtml(l)}</strong>`).join(', ');
            const isDone = data.collected >= data.qty;
            const collectedHtml = data.collected > 0
                ? `<div class="shop-collected" style="${isDone ? 'color:#388e3c;font-weight:700;' : ''}">${data.collected} / ${data.qty} collected${isDone ? ' ✓' : ''}</div>`
                : '';
            return `
                <div class="shop-ingredient-row" style="${isDone ? 'opacity:0.6;' : ''}">
                    <div class="shop-qty-name">
                        <span class="shop-qty" style="${isDone ? 'background:#c8e6c9;color:#388e3c;' : ''}">${data.qty}x</span>
                        <span class="shop-name" style="${isDone ? 'text-decoration:line-through;color:#aaa;' : ''}">${escHtml(name)}</span>
                    </div>
                    ${collectedHtml}
                    <div class="shop-location">Source: ${locationsHtml}</div>
                </div>`;
        }).join('');

        const itemsLabel = appState.selectedItems.size === 1 ? '1 item' : `${appState.selectedItems.size} items`;
        content.innerHTML = `
            <div class="shop-section-header">${itemsLabel} &mdash; ${sorted.length} ingredient${sorted.length !== 1 ? 's' : ''} total</div>
            ${rows}`;
    }

    // --- RESET ---
    let resetConfirmTimer = null;

    function confirmReset() {
        const btn = document.getElementById('resetBtn');
        if (resetConfirmTimer) {
            // Second click — execute reset
            clearTimeout(resetConfirmTimer);
            resetConfirmTimer = null;
            btn.textContent = 'Reset All Progress';
            resetProgress();
        } else {
            // First click — ask for confirmation
            btn.textContent = 'Confirm Reset?';
            resetConfirmTimer = setTimeout(() => {
                btn.textContent = 'Reset All Progress';
                resetConfirmTimer = null;
            }, 2500);
        }
    }

    function resetProgress() {
        appState.progress = {};
        storage.removeItem('synergy-crafting-progress');
        storage.removeItem('synergy-crafting-shopping');
        appState.selectedItems = new Set();
        filterData(); // full re-render restores all checkboxes to unchecked
        if (appState.panelOpen) updatePanel();
    }

    // Close panel with Escape key
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && appState.panelOpen) togglePanel();
    });

    // --- INITIAL LOAD ---
    loadState();
    document.getElementById('listCount').textContent = appState.selectedItems.size;
    renderTable(parsedCraftingData);
</script>
</body>
</html>
